name: ObligeApp
options:
  bundleIdPrefix: kr.oblige
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.5.0"

targets:
  ObligeApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ObligeApp
        excludes:
          - "**/.DS_Store"
    resources: []
    info:
      path: ObligeApp/App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: systemBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        NSPhotoLibraryUsageDescription: "공병 반납 신청 시 사진을 첨부하기 위해 사진 라이브러리 접근이 필요합니다."
        NSCameraUsageDescription: "공병 사진을 촬영하기 위해 카메라 접근이 필요합니다."
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.oblige.app
        INFOPLIST_FILE: ObligeApp/App/Info.plist
        SUPABASE_URL: ""
        SUPABASE_ANON_KEY: ""
    dependencies:
      - package: Supabase
        product: Supabase
    scheme:
      testTargets: []
